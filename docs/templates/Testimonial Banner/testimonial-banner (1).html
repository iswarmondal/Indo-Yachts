<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonial Banner - Indo Yachts</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ════════════════════════════════════════════════════════════════
       CSS VARIABLES
       ════════════════════════════════════════════════════════════════ */
    :root {
      --oxblood: #953334;
      --deep-sea: #0A1628;
      --white: #FFFFFF;
      --gold-muted: #B8A878;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ════════════════════════════════════════════════════════════════
       TESTIMONIAL BANNER
       ════════════════════════════════════════════════════════════════ */
    .featured-quote {
      background: var(--deep-sea);
      padding: 120px 48px;
      text-align: center;
      position: relative;
    }

    .featured-quote::before {
      content: '"';
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 180px;
      font-weight: 300;
      color: var(--oxblood);
      opacity: 0.3;
      line-height: 1;
    }

    .featured-quote__inner {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .featured-quote__stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .featured-quote__star {
      width: 20px;
      height: 20px;
      fill: var(--gold-muted);
    }

    .featured-quote__text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 300;
      font-style: italic;
      color: var(--white);
      line-height: 1.4;
      margin-bottom: 32px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .featured-quote__author {
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 6px;
    }

    .featured-quote__source {
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      color: var(--gold-muted);
    }

    @media (max-width: 768px) {
      .featured-quote { padding: 80px 24px; }
      .featured-quote::before { font-size: 120px; top: 30px; }
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════════════════════════════
       TESTIMONIAL BANNER
       ════════════════════════════════════════════════════════════════ -->
  <section class="featured-quote">
    <div class="featured-quote__inner">
      <div class="featured-quote__stars">
        <svg class="featured-quote__star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg class="featured-quote__star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg class="featured-quote__star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg class="featured-quote__star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg class="featured-quote__star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
      <p class="featured-quote__text">"We had high expectations but this was off the scale! The boat is exquisite, the team fabulous and the food first class. All 100%. We are all blown away."</p>
      <p class="featured-quote__author">Private Charter Guest</p>
      <p class="featured-quote__source">Raja Ampat, 2024</p>
    </div>
  </section>

</body>
</html>
