<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indo Yachts Footer - Final</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-sea: #0A1628;
      --oxblood: #953334;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Manrope', sans-serif; background: #f0f0f0; }
    
    .spacer {
      height: 50vh;
      background: linear-gradient(#fafafa, #f0f0f0);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 13px;
      letter-spacing: 0.1em;
    }

    /* =====================================================
       FOOTER
       ===================================================== */
    .footer {
      background: var(--deep-sea);
      color: white;
      position: relative;
    }

    .footer__accent-top {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 48px;
      background: var(--oxblood);
    }

    .footer__main {
      max-width: 960px;
      margin: 0 auto;
      padding: 88px 48px 0;
      text-align: center;
    }

    .footer__logo {
      height: 28px;
      width: auto;
      opacity: 0.9;
      margin-bottom: 56px;
    }

    .footer__nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 56px;
    }

    .footer__nav-link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      padding: 0 14px;
      transition: color 0.3s ease;
    }

    .footer__nav-link:hover {
      color: rgba(255,255,255,0.95);
    }

    .footer__nav-divider {
      width: 1px;
      height: 10px;
      background: rgba(255,255,255,0.12);
    }

    /* =====================================================
       BOTTOM BAR - True centered copyright
       ===================================================== */
    .footer__bottom {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
      padding: 32px 0;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .footer__left {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: flex-start;
    }

    .footer__right {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: flex-end;
    }

    .footer__sails {
      height: 34px;
      width: auto;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .footer__legal-text {
      text-align: left;
      font-size: 10px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(255,255,255,0.3);
    }

    .footer__legal-text a {
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      display: block;
      transition: color 0.3s ease;
    }

    .footer__legal-text a:hover {
      color: rgba(255,255,255,0.5);
    }

    .footer__copyright {
      font-size: 10px;
      font-weight: 400;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }

    .footer__iyba-text {
      font-size: 10px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(255,255,255,0.3);
      text-align: right;
    }

    .footer__iyba-logo {
      height: 22px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.4;
      flex-shrink: 0;
    }

    .footer__accent-bottom {
      height: 2px;
      background: var(--oxblood);
    }

    /* =====================================================
       RESPONSIVE
       ===================================================== */
    @media (max-width: 768px) {
      .footer__accent-top {
        height: 32px;
      }

      .footer__main {
        padding: 72px 32px 0;
      }

      .footer__logo {
        height: 24px;
        margin-bottom: 44px;
      }

      .footer__nav {
        display: grid;
        grid-template-columns: repeat(3, auto);
        justify-content: center;
        gap: 20px 32px;
        margin-bottom: 44px;
      }

      .footer__nav-divider {
        display: none;
      }

      .footer__nav-link {
        padding: 0;
        font-size: 10px;
      }

      .footer__bottom {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 32px 0;
        text-align: center;
        justify-items: center;
      }

      .footer__left {
        flex-direction: column;
        gap: 16px;
        order: 1;
      }

      .footer__sails {
        height: 40px;
        opacity: 0.12;
      }

      .footer__legal-text {
        text-align: center;
      }

      .footer__copyright {
        order: 2;
      }

      .footer__right {
        flex-direction: column;
        gap: 16px;
        order: 3;
      }

      .footer__iyba-text {
        text-align: center;
      }

      .footer__iyba-logo {
        height: 24px;
      }
    }

    @media (max-width: 480px) {
      .footer__main {
        padding: 64px 24px 0;
      }

      .footer__nav {
        gap: 16px 24px;
      }

      .footer__nav-link {
        font-size: 9px;
        letter-spacing: 0.08em;
      }
    }
  </style>
</head>
<body>

  <div class="spacer">PAGE CONTENT</div>

  <footer class="footer">
    <div class="footer__accent-top"></div>
    <div class="footer__main">

      <img src="images/INDO_YACHTS_LOGO_WHITE.png" alt="Indo Yachts" class="footer__logo">

      <nav class="footer__nav">
        <a href="/yachts" class="footer__nav-link">Yachts</a>
        <span class="footer__nav-divider"></span>
        <a href="/destinations" class="footer__nav-link">Destinations</a>
        <span class="footer__nav-divider"></span>
        <a href="/itineraries" class="footer__nav-link">Itineraries</a>
        <span class="footer__nav-divider"></span>
        <a href="/about" class="footer__nav-link">About</a>
        <span class="footer__nav-divider"></span>
        <a href="/resources" class="footer__nav-link">Resources</a>
        <span class="footer__nav-divider"></span>
        <a href="/contact" class="footer__nav-link">Contact</a>
      </nav>

      <div class="footer__bottom">
        <div class="footer__left">
          <img src="images/Indo_Yachts_Sails_Light.png" alt="" class="footer__sails">
          <div class="footer__legal-text">
            <a href="/privacy">Privacy Policy</a>
            <a href="/terms">Terms & Conditions</a>
          </div>
        </div>
        
        <span class="footer__copyright">© 2012–2025 Indo Yachts</span>
        
        <div class="footer__right">
          <div class="footer__iyba-text">
            International Yacht<br>Brokers Association
          </div>
          <img src="images/IYBA_Logo.png" alt="IYBA" class="footer__iyba-logo">
        </div>
      </div>

    </div>
    <div class="footer__accent-bottom"></div>
  </footer>

</body>
</html>
